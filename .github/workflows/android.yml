name: Build Android APK (Debug Direct Link)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # بناء نسخة الديبق الخاصة بك
      - name: Build APK with Gradle
        run: ./gradlew assembleEmbedNoRecordDebug

      # الخدعة البرمجية: رفع الـ APK مباشرة والحصول على رابط تحميل صريح بدون Zip
      - name: Upload APK and Get Direct Link
        run: |
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          FILENAME=$(basename "$APK_PATH")
          
          # رفع الملف والحصول على الرابط المباشر
          DOWNLOAD_LINK=$(curl --upload-file "$APK_PATH" "https://transfer.sh/$FILENAME")
          
          echo "========================================================"
          echo "🚀 رابط تحميل ملف الـ APK المباشر للديبق:"
          echo "$DOWNLOAD_LINK"
          echo "========================================================"
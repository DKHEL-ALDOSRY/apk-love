name: Android CI (Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 👈 هذا السطر هو السحر الذي سيجلب ملفات المحرك الناقصة

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Normal NoRecord Debug APK
        run: ./gradlew clean assembleNormalNoRecordDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Adawati-Game-APK
          path: app/build/outputs/apk/normalNoRecord/debug/*.apk
          retention-days: 7